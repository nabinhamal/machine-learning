global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

frontend http_front
    bind *:80
    default_backend http_back

backend http_back
    balance roundrobin
    # Primary Nginx
    server nginx-primary nginx-primary:80 check inter 2s fall 3 rise 2
    # Standby Nginx
    server nginx-backup nginx-backup:80 check inter 2s fall 3 rise 2 backup

listen stats
    bind *:1936
    stats enable
    stats uri /
    stats refresh 5s
    stats show-node
    stats auth admin:admin
